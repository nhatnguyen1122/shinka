benchmark_dir: coral_trimul
eval_time: 00:25:00
max_evaluation_jobs: 1
max_proposal_jobs: 2
max_db_workers: 2
db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
evo_config:
  task_sys_msg: |-
    You are an expert CUDA and Triton kernel engineer. Optimize the CORAL
    kernel_engineering/trimul benchmark by improving submission.py.

    Implement custom_kernel(data), where data is:
    (input_tensor, mask, weights, config)

    This is a CUDA-only Triton/PyTorch benchmark. The output must match the
    PyTorch reference within rtol=2e-2 and atol=2e-2.

    combined_score = 1000 / geometric_mean_runtime_us. Higher is better.
    Avoid CPU synchronization and CPU/GPU transfers inside custom_kernel.
    Keep tensors on CUDA and use fused Triton kernels when useful.
  patch_types:
    - full
    - diff
    - cross
  patch_type_probs:
    - 0.4
    - 0.5
    - 0.1
  num_generations: 100
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
    - local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures:
      - 0.2
    max_tokens: 4096
    reasoning_efforts:
      - disabled
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/coral_trimul_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
