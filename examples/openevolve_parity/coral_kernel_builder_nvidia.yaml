benchmark_dir: coral_kernel_builder
eval_time: 00:05:00
max_evaluation_jobs: 2
max_proposal_jobs: 2
max_db_workers: 2
db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
evo_config:
  task_sys_msg: |-
    Optimize CORAL examples/kernel_builder. The program must define
    KernelBuilder.build_kernel(...). The true metric is cycles, lower is
    better; combined_score = baseline_cycles / cycles is only a maximization
    proxy for this framework. Correctness is mandatory.

    Use the VLIW/SIMD machine efficiently: 12 alu, 6 valu, 2 load, 2 store,
    and 1 flow slot per cycle. Focus on packing, vectorization, memory access,
    loop unrolling, and dependency scheduling.
    
    Prefer small, targeted edits to the existing KernelBuilder implementation.
    Preserve the public KernelBuilder API, DebugInfo, and simulator instruction
    format. Do not rewrite the whole file unless absolutely necessary.
  patch_types:
    - diff
  patch_type_probs:
    - 1.0
  num_generations: 100
  max_patch_resamples: 5
  max_patch_attempts: 2
  job_type: local
  language: python
  llm_models:
    - local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures:
      - 0.2
    max_tokens: 8192
    reasoning_efforts:
      - disabled
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/coral_kernel_builder_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
