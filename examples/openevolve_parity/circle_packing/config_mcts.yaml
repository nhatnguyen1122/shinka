llm:
  provider: gemini
  primary_model: gemini-2.5-flash
  primary_model_weight: 1.0
  reasoning_effort: none
  temperature: 0.7
  max_tokens: 4096
  # reasoning_effort: low
  # temperature: 0.2
  # max_tokens: 8192
  # reasoning_effort: medium
  # temperature: 0.2
  # max_tokens: 16000
  timeout: 600
  retries: 3
  retry_delay: 5
  max_total_tokens: 5000000

prompt:
  system_message: |
    You are an expert mathematician specializing in circle packing problems and computational geometry. Your task is to improve a constructor function that directly produces a specific arrangement of 26 circles in a unit square, maximizing the sum of their radii.
    Key insights:
    - Circle packings often follow hexagonal patterns in the densest regions
    - Edge effects make square container packing harder than infinite packing
    - Circles can be placed in layers or shells when confined to a square
  num_top_programs: 3
  use_template_stochasticity: true

database:
  population_size: 60
  archive_size: 25
  num_islands: 4

evaluator:
  timeout: 60
  cascade_evaluation: true
  cascade_thresholds: [0.5, 0.75]
  parallel_evaluations: 4

diff_based_evolution: false

search:
  strategy: "tree_qd_mcts"
  exploration_constant: 0.7
  qd_weight: 0.5
  max_tree_depth: 15
  backup: "mixed"
  backup_alpha: 0.5
  widening_alpha: 0.5
