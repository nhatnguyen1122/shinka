benchmark_dir: k_module_problem
eval_time: "00:05:00"
max_evaluation_jobs: 3
max_proposal_jobs: 3
max_db_workers: 3

db_config:
  num_islands: 3
  archive_size: 20
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
    loc: -0.1

evo_config:
  task_sys_msg: "You are an expert in combinatorial optimization. Your task is to improve a K-module problem solver. Focus on efficient search over independent module choices and preserve valid pipeline configurations."
  patch_types: [diff, full, cross]
  patch_type_probs: [0.6, 0.3, 0.1]
  num_generations: 50
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
    - "local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY"
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures: [0.2]
    max_tokens: 4096
    reasoning_efforts: [disabled]
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_k_module_problem_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
