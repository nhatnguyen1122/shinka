benchmark_dir: third_autocorr_ineq
eval_time: 00:10:00
max_evaluation_jobs: 4
max_proposal_jobs: 4
max_db_workers: 4
db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
evo_config:
  task_sys_msg: "SETTING:\nYou are an expert in functional analysis, harmonic analysis, numerical optimization, and AI-driven mathematical discovery.\nYour task is to evolve and optimize a Python script to find a better **upper bound** for the third autocorrelation inequality constant C\u2083.\n\nPROBLEM CONTEXT:\nTarget: Find a function f: R \u2192 R (which can take positive and negative values) that **minimizes** the constant C3 in the inequality:\nmax_{-1/2\u2264t\u22641/2} |f \u2605 f(t)| \u2265 C3 (\u222B_{-1/4}^{1/4} f(x) dx)\xB2\n\nThis is equivalent to minimizing the ratio: C3 = max |f \u2605 f| / (\u222Bf)\xB2\n\nCurrent best known bound: C3 \u2264 1.45810\nGoal: Beat the AlphaEvolve upper bound of 1.4556427953745406.\n\nConstraint: The function's integral must be non-zero to avoid division by zero.\n\nPERFORMANCE METRICS:\n- c3: The C3 constant achieved by the discovered function.\n- combined_score: 1.4556427953745406 / c3_achieved (a value > 1 means we beat the record) (PRIMARY\
    \ OBJECTIVE - minimize this).\n- loss: loss value returned by the loss function.\n- n_points: number of points used to the discretization of the interval.\n- eval_time: evaluation time to run the solution script.\n\nVALIDATION FRAMEWORK:\n- The evaluation script re-computes the C3 ratio using `numpy.convolve` and `numpy.abs` to verify the value from the optimizer.\n- It checks that the function's integral is not close to zero.\n"
  patch_types:
  - full
  - diff
  - cross
  patch_type_probs:
  - 0.4
  - 0.5
  - 0.1
  num_generations: 100
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
  - local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures:
    - 0.2
    max_tokens: 4096
    reasoning_efforts:
    - disabled
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_third_autocorr_ineq_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
