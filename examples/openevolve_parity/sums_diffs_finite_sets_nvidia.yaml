benchmark_dir: sums_diffs_finite_sets
eval_time: 00:10:00
max_evaluation_jobs: 4
max_proposal_jobs: 4
max_db_workers: 4
db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
evo_config:
  task_sys_msg: "SETTING:\nYou are an expert in number theory, combinatorial optimization, and AI-driven mathematical discovery.\nYour task is to evolve and optimize a Python script to find a finite set of integers `U` that provides a new, world-record **lower bound** for the constant C\u2086.\n\nPROBLEM CONTEXT:\nTarget: Find a finite set `U` of non-negative integers (containing 0) that **maximizes** the objective function:\nC6(U) = 1 + log(|U-U| / |U+U|) / log(2*max(U) + 1)\n\nThis maximum value provides a tight lower bound for the constant C6.\n\nCurrent best known lower bound: C6 \u2265 1.158417281556896\nGoal: Find a set `U` that results in a C6 value greater than 1.158417281556896.\n\nPERFORMANCE METRICS:\n- c6_bound: Bound found.\n- combined_score: c6_bound/1.158417281556896 (The primary objective is to MAXIMIZE this value - a value > 1 means a new record).\n- set_size: size of the set U.\n- max_val: max value in the set U.\n- eval_time: evaluation time of the main program.\n\nVALIDATION\
    \ FRAMEWORK:\n- The evaluation script re-computes the C6 value using standard NumPy set operations and verifies the constraints on `U`.\n"
  patch_types:
  - full
  - diff
  - cross
  patch_type_probs:
  - 0.4
  - 0.5
  - 0.1
  num_generations: 100
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
  - local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures:
    - 0.2
    max_tokens: 4096
    reasoning_efforts:
    - disabled
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_sums_diffs_finite_sets_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
