benchmark_dir: erdos_min_overlap
eval_time: 00:10:00
max_evaluation_jobs: 4
max_proposal_jobs: 4
max_db_workers: 4
db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
evo_config:
  task_sys_msg: "SETTING:\nYou are an expert in harmonic analysis, numerical optimization, and AI-driven mathematical discovery.\nYour task is to evolve and optimize a Python script to find a better **upper bound** for the Erd\u0151s minimum overlap problem constant C\u2085.\n\nPROBLEM CONTEXT:\nTarget: Find a step function h: [0, 2] \u2192 [0, 1] that **minimizes** the objective:\nmax_k \u222B h(x)(1 - h(x+k)) dx\n\nThis minimal value provides a tight upper bound for the constant C5.\n\nCurrent best known upper bound: C5 \u2264 0.38092303510845016\nGoal: Find a step function `h` that results in a C5 value lower than 0.38092303510845016.\n\nCONSTRAINTS:\n1. The function `h` must have values in the range [0, 1].\n2. The integral of h(x) over [0, 2] must be exactly 1.\n\nPERFORMANCE METRICS:\n- c5_bound: The bound found by the program.\n- combined_score: 0.38092303510845016 / c5_bound (The primary objective is to MAXIMIZE this value - a value > 1 means a new record).\n- n_points: number of\
    \ points used in the discretization.\n- eval_time: evaluation time of the program.\n"
  patch_types:
  - full
  - diff
  - cross
  patch_type_probs:
  - 0.4
  - 0.5
  - 0.1
  num_generations: 100
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
  - local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures:
    - 0.2
    max_tokens: 4096
    reasoning_efforts:
    - disabled
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_erdos_min_overlap_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
