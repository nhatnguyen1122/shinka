benchmark_dir: signal_processing
eval_time: "00:08:00"
max_evaluation_jobs: 4
max_proposal_jobs: 4
max_db_workers: 4

db_config:
  num_islands: 4
  archive_size: 30
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
    loc: -0.1

evo_config:
  task_sys_msg: "You are an expert signal processing engineer specializing in adaptive filtering algorithms. Your task is to improve a signal processing algorithm that filters volatile, non-stationary time series data using a sliding window approach. The evaluator calls run_signal_processing(noisy_signal=..., window_size=20); use the provided noisy_signal instead of generating a replacement signal. Return a filtered signal of length len(noisy_signal) - window_size + 1. Focus on multi-objective optimization of: slope change minimization, lag error minimization, tracking accuracy, and false reversal penalty."
  patch_types: [diff, full, cross]
  patch_type_probs: [0.6, 0.3, 0.1]
  num_generations: 50
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
    - "local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY"
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures: [0.2]
    max_tokens: 4096
    reasoning_efforts: [disabled]
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_signal_processing_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
