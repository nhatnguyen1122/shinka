benchmark_dir: matmul
eval_time: 00:10:00
max_evaluation_jobs: 4
max_proposal_jobs: 4
max_db_workers: 4
db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
evo_config:
  task_sys_msg: "SETTING:\nYou are an expert in computational linear algebra, numerical optimization, and AI-driven algorithm discovery.\nYour task is to evolve and optimize a Python script to find the lowest-rank decomposition of the matrix multiplication tensor for a specific instance with variables (n=2,m=4,p=5) fixed.\n\nPROBLEM CONTEXT:\nTarget: Find the minimal rank R for the tensor decomposition T_ijk = \u2211_r=1^R U_ir V_jr W_kr.\nThe goal is to beat the best algorithm and discover a state-of-the-art algorithm with the lowest rank possible.\nConstraint: The reconstructed tensor from the learned factors (U, V, W) must be EXACTLY EQUAL to the ground-truth matrix multiplication tensor T_ijk after its composition to a tensor form.\nThis can be enforced in two ways:\n* by minimizing the loss function to near-zero, and do a \"rounding algorithm\" to make the continuous approximate solution converge to a exactly one where its elements are integer multiples of a constant.\n* by making an\
    \ algorithm that search in the space of the set of possible elements, or a grid of elements that can compose the final decomposition.\nYou can be creative and choose the best possible algorithm to solve this problem, for example incorporating constraints that force the solution to be in the right space, or by enforcing this from the start.\n\nMATHEMATICAL FORMULATION:\nGiven: The standard matrix multiplication tensor T for n, m, p fixed.\nObjective: Find the smallest integer R such that there exist real or complex valued matrices U, V, W of shapes (n*p, R), (n*m, R), and (m*p, R) that compose T_ijk.\n\nPERFORMANCE METRICS:\ncombined_score: The minimal inverse rank 32/R for which the optimization was successful, where 32 is the best know decomposition found by Google. A value of 1.0 means you have matched the state-of-the-art. (PRIMARY OBJECTIVE - maximize 1/R).\nloss: The final loss function result if applicable to the method used.\nrank: rank of the best decomposition found.\neval_time:\
    \ time of the evaluation.\n\nVALIDATION FRAMEWORK:\nNumerical Validation: The final loss for a successful run must be below the success_threshold (e.g., 1e-6).\nEquality validation: The final decomposition must be exactly equal to the tensor T_ijk:\nmatmul_tensor = np.zeros((n * m, m * p, p * n), dtype=np.int32)\nfor i in range(n):\n  for j in range(m):\n    for k in range(p):\n      matmul_tensor[i * m + j][j * p + k][k * n + i] = 1\nRank Validation: The discovered_rank must be an integer.\n\nTECHNICAL REQUIREMENTS:\nReproducibility: Ensure the JAX PRNGKey is handled correctly (or any lib with random numbers) to get reproducible results for a given set of initial conditions and hyperparameters.\nNumerical Stability: Be aware of potential floating-point precision issues and the possibility of exploding or vanishing gradients, suggesting remedies like gradient clipping if necessary.\n\nPROBLEM-SPECIFIC CONSIDERATIONS:\nInitialization is Key: Due to the non-convex landscape, the success\
    \ of a run is highly dependent on the random initialization. A robust solution should work from multiple different random seeds.\nSteps vs. Learning Rate Trade-off: A lower learning rate might require more num_steps to converge, and vice-versa. Explore this relationship to find the most efficient path to a solution.\nFrom Discovery to Algorithm: The end goal is not just the factors U, V, W, but the algorithm they represent. A good solution should be interpretable as a series of R multiplications and additions/subtractions.\nThe robustness and efficiency of the proposed code and hyperparameter configuration (i.e., it should converge reliably and quickly).\n"
  patch_types:
  - full
  - diff
  - cross
  patch_type_probs:
  - 0.4
  - 0.5
  - 0.1
  num_generations: 100
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
  - local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures:
    - 0.2
    max_tokens: 4096
    reasoning_efforts:
    - disabled
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_matmul_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
