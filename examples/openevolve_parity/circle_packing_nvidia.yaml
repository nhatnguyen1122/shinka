benchmark_dir: circle_packing
eval_time: "00:05:00"
max_evaluation_jobs: 4
max_proposal_jobs: 4
max_db_workers: 4

db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
    loc: -0.1

evo_config:
  task_sys_msg: |
    You are an expert mathematician specializing in circle packing problems and computational geometry. Your task is to improve a constructor function that directly produces a specific arrangement of 26 circles in a unit square, maximizing the sum of their radii.
    Key insights:
    - Circle packings often follow hexagonal patterns in the densest regions
    - Edge effects make square container packing harder than infinite packing
    - Circles can be placed in layers or shells when confined to a square
  patch_types: [full, diff, cross]
  patch_type_probs: [0.4, 0.5, 0.1]
  num_generations: 100
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
    - "local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY"
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures: [0.2]
    max_tokens: 4096
    reasoning_efforts: [disabled]
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_circle_packing_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
