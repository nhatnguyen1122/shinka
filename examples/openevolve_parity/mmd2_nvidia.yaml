benchmark_dir: minimizing_max_min_dist/2
eval_time: 00:10:00
max_evaluation_jobs: 4
max_proposal_jobs: 4
max_db_workers: 4
db_config:
  num_islands: 4
  archive_size: 25
  elite_selection_ratio: 0.2
  num_archive_inspirations: 2
  num_top_k_inspirations: 1
  migration_interval: 10
  migration_rate: 0.1
  island_elitism: true
  enforce_island_separation: true
  parent_selection_strategy: weighted
  archive_selection_strategy: crowding
  island_selection_strategy: equal
  archive_criteria:
    combined_score: 1.0
evo_config:
  task_sys_msg: "SETTING:\nYou are an expert computational geometer and optimization specialist focusing on point dispersion problems.\nYour task is to evolve a constructor function that generates an optimal arrangement of exactly 16 points in 2D space, maximizing the ratio of minimum distance to maximum distance between all point pairs.\n\nPROBLEM CONTEXT:\n- Target: Beat the AlphaEvolve benchmark of min/max ratio = 1/\u221A12.889266112 \u2248 0.2786\n- Constraint: Points must be placed in 2D Euclidean space (typically normalized to unit square [0,1] \xD7 [0,1])\n- Mathematical formulation: For points Pi = (xi, yi), i = 1,...,16:\n  * Distance matrix: dij = \u221A[(xi-xj)\xB2 + (yi-yj)\xB2] for all i\u2260j\n  * Minimum distance: dmin = min{dij : i\u2260j}\n  * Maximum distance: dmax = max{dij : i\u2260j}\n  * Objective: maximize dmin/dmax subject to spatial constraints\n\nPERFORMANCE METRICS:\n1. **min_max_ratio**: dmin/dmax ratio (PRIMARY OBJECTIVE - maximize)\n2. **combined_score**:\
    \ min_max_ratio / 0.2786 (progress toward beating AlphaEvolve benchmark)\n3. **eval_time**: Execution time in seconds (balance accuracy vs. efficiency)\n\nTECHNICAL REQUIREMENTS:\n- **Reproducibility**: Fixed random seeds for all stochastic components\n"
  patch_types:
  - full
  - diff
  - cross
  patch_type_probs:
  - 0.4
  - 0.5
  - 0.1
  num_generations: 100
  max_patch_resamples: 3
  max_patch_attempts: 1
  job_type: local
  language: python
  llm_models:
  - local/openai/gpt-oss-120b@https://integrate.api.nvidia.com/v1?api_key_env=NVIDIA_API_KEY
  llm_dynamic_selection: fixed
  llm_kwargs:
    temperatures:
    - 0.2
    max_tokens: 4096
    reasoning_efforts:
    - disabled
  meta_rec_interval: null
  embedding_model: null
  results_dir: results/openevolve_parity_mmd2_nvidia
  max_novelty_attempts: 1
  max_api_costs: null
  evolve_prompts: false
